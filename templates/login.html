<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Admin Login — Habelite Recon</title>
    <style>
      *,
      *::before,
      *::after {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
      }
      body {
        font-family: "Segoe UI", Arial, sans-serif;
        background: #f0f4f8;
        min-height: 100vh;
        display: flex;
        align-items: center;
        justify-content: center;
        padding: 2rem;
      }
      .card {
        background: #fff;
        border-radius: 12px;
        box-shadow: 0 4px 24px rgba(0, 0, 0, 0.1);
        max-width: 400px;
        width: 100%;
        padding: 2.5rem;
      }
      h1 {
        font-size: 1.2rem;
        color: #1f4e79;
        margin-bottom: 0.3rem;
      }
      p {
        font-size: 0.88rem;
        color: #666;
        margin-bottom: 1.5rem;
      }
      label {
        display: block;
        font-weight: 600;
        font-size: 0.88rem;
        color: #333;
        margin-bottom: 0.4rem;
      }
      input[type="password"] {
        width: 100%;
        padding: 0.65rem 0.9rem;
        border: 1.5px solid #ccc;
        border-radius: 6px;
        font-size: 0.95rem;
        margin-bottom: 1rem;
      }
      .btn {
        display: block;
        width: 100%;
        padding: 0.8rem;
        background: #1f4e79;
        color: #fff;
        font-size: 0.95rem;
        font-weight: 700;
        border: none;
        border-radius: 8px;
        cursor: pointer;
      }
      .btn:hover {
        background: #163a5c;
      }
      .alert {
        padding: 0.7rem 1rem;
        border-radius: 6px;
        margin-bottom: 1rem;
        font-size: 0.85rem;
        background: #fdecea;
        color: #b71c1c;
        border-left: 4px solid #e53935;
      }
      .back {
        text-align: center;
        margin-top: 1rem;
        font-size: 0.82rem;
      }
      .back a {
        color: #1f4e79;
        text-decoration: none;
      }
    </style>
  </head>
  <body>
    <div class="card">
      <h1>Admin Access</h1>
      <p>Enter the admin password to manage reason codes.</p>
      {% for msg in get_flashed_messages(category_filter=["error"]) %}
      <div class="alert">⚠ {{ msg }}</div>
      {% endfor %}
      <form method="POST">
        <label>Password</label>
        <input type="password" name="password" autofocus required />
        <button class="btn" type="submit">Sign In</button>
      </form>
      <div class="back"><a href="/">← Back to reconciliation</a></div>
    </div>
  </body>
</html>
